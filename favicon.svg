<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Hippocorn">
  <!-- cream rounded tile so it reads on both light and dark browser tabs -->
  <rect width="32" height="32" rx="7" fill="#F5F1EA"/>
  <!-- party hat: rainbow cone (red tip → orange → yellow base) -->
  <polygon points="16,2.5 13.7,7 18.3,7" fill="#D75856"/>
  <polygon points="13.7,7 18.3,7 20,10.6 12,10.6" fill="#E88149"/>
  <polygon points="12,10.6 20,10.6 22,14 10,14" fill="#F4CA66"/>
  <circle cx="16" cy="2.6" r="1.25" fill="#fff"/>
  <!-- head -->
  <circle cx="16" cy="21" r="8.6" fill="#8B7FE8"/>
  <!-- lighter snout/belly -->
  <ellipse cx="16" cy="23.5" rx="6.2" ry="4.6" fill="#ADA1ED"/>
  <!-- eye + nostril -->
  <circle cx="12.6" cy="20" r="1.8" fill="#1A1A1A"/>
  <circle cx="14.6" cy="24.6" r="1" fill="#7C6BF0"/>
</svg>
